<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Dnevnik</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #eef2f5; padding: 20px; margin:0;}
  #login, #main { max-width: 700px; margin: auto; background: white; padding: 30px 20px; border-radius: 12px; box-shadow: 0 6px 12px rgba(0,0,0,0.15);}
  h2 { text-align: center; margin-bottom: 20px; color: #333; }
  label { display: block; margin-top: 10px; font-weight: bold; }
  input, select { width: 95%; padding: 8px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; }
  button { cursor: pointer; border-radius: 6px; border: none; padding: 8px 15px; margin-top: 10px; font-weight: bold; transition: 0.2s;}
  #logout-btn { margin-top: 20px; background: #f44336; color:white; }
  #logout-btn:hover { background: #d32f2f; }
  .class-frame { border: 1px solid #ccc; padding: 15px; margin: 15px 0; border-radius: 10px; background: #fafafa; transition:0.2s; }
  .class-frame:hover { box-shadow: 0 6px 12px rgba(0,0,0,0.2);}
  .class-header { display:flex; justify-content: space-between; align-items:center; cursor:pointer; font-weight:bold; font-size:1.1em; }
  .grades { display: flex; flex-direction: column; margin-top: 10px; overflow:hidden; transition: max-height 0.3s ease;}
  .grade-item { 
    display: flex; 
    flex-direction: column; 
    justify-content: flex-start; 
    padding: 10px 10px; 
    margin: 3px 0; 
    background: #e3f2fd; 
    border-radius: 6px; 
    font-size: 1em; 
    color: #111; 
    opacity:1;  
    transform: none;
  }
  .grade-item span { margin: 2px 0; }
  .grade-item span.biljeska { font-size: 0.85em; color: #555; margin-left:0; }
  .grade-buttons { margin-top: 10px; display:flex; flex-wrap:wrap;}
  .grade-buttons button { margin: 2px; padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; color:white; transition:0.2s; }
  .grade-buttons button.red { background:#f44336; }
  .grade-buttons button.red:hover { background:#d32f2f; }
  .grade-buttons button.green { background:#4caf50; }
  .grade-buttons button.green:hover { background:#388e3c; }
  .grade-item button.edit-btn { margin-left:5px; background:#ff9800; color:white; align-self:flex-end; }
  .grade-item button.edit-btn:hover { background:#fb8c00; }
  .grade-item button.del-btn { margin-left:5px; background:#f44336; color:white; align-self:flex-end; }
  .grade-item button.del-btn:hover { background:#d32f2f; }
  @media (max-width:500px){ input, select, button { width:100%; margin-top:5px; } }
  #final-average, #class-average { font-weight:bold; margin-top:15px; font-size:1.1em; text-align:right; }
</style>
</head>
<body>

<div id="login">
  <h2>Dnevnik</h2>
  <label>Korisničko ime:</label>
  <input id="username">
  <label>Lozinka:</label>
  <input id="password" type="password">
  <button onclick="login()">Prijavi se</button>
</div>

<div id="main" style="display:none;">
  <h2>Dnevnik</h2>
  <div id="student-select-container" style="display:none; margin-bottom:15px;">
    <label>Odaberi studenta:</label>
    <select id="student-select"></select>
  </div>
  <div id="classes"></div>
  <div id="final-average"></div>
  <button id="logout-btn" onclick="logout()">Odjavi se</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update, get, set } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-database.js";

// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyCxhKiINbNGXUlzDU_weeQ0RI14D4oeEB4",
  authDomain: "dnevnik-128.firebaseapp.com",
  databaseURL: "https://dnevnik-128-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dnevnik-128",
  storageBucket: "dnevnik-128.appspot.com",
  messagingSenderId: "270662675574",
  appId: "1:270662675574:web:1e9142cd8e3fde4e5e8357"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// --- CONFIG ---
const ADMIN = {username:"neosuperas@dnevnik.com", password:"NSdvnk"};
const STUDENTS = [{username:"sssara@dnevnik.com", password:"SSara"}];
const classNames = ["Rekreacija","Kromarski","Životne vještine","Crtanje","Python","Izrađivanje"];

let currentUser=null, isAdmin=false, selectedStudent=null;

// --- LOGIN / LOGOUT ---
window.login = async function(){
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;
    if(u===ADMIN.username && p===ADMIN.password){
        isAdmin=true; currentUser=ADMIN.username;
        document.getElementById("student-select-container").style.display="block";
        populateStudentSelect();
        selectedStudent=STUDENTS[0].username;
    } else {
        const student=STUDENTS.find(s=>s.username===u && s.password===p);
        if(student){ isAdmin=false; currentUser=student.username; selectedStudent=student.username; document.getElementById("student-select-container").style.display="none"; }
        else { alert("Neispravno korisničko ime ili lozinka!"); return; }
    }
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    await renderClasses();
};

window.logout = function(){
    currentUser=null; selectedStudent=null;
    document.getElementById("login").style.display="block";
    document.getElementById("main").style.display="none";
};

// --- STUDENT SELECT ---
function populateStudentSelect(){
    const sel=document.getElementById("student-select");
    sel.innerHTML="";
    for(let s of STUDENTS){
        const opt=document.createElement("option");
        opt.value=s.username; opt.textContent=s.username; sel.appendChild(opt);
    }
    sel.onchange=()=>{ selectedStudent=sel.value; renderClasses(); };
}

// --- AVERAGE CALC ---
function calculateFinalAverage(userGrades){
    let sum=0,count=0;
    for(let cls of classNames){ 
        for(let g of userGrades[cls]){ if(g.value){ sum+=g.value; count++; } }
    }
    return count===0 ? "-" : (sum/count).toFixed(2);
}

function calculateClassAverage(grades){
    let sum=0,count=0;
    for(let g of grades){ if(g.value){ sum+=g.value; count++; } }
    return count===0 ? "-" : (sum/count).toFixed(2);
}

// --- RENDER CLASSES ---
async function renderClasses(){
    const container=document.getElementById("classes");
    container.innerHTML="";
    const userRef = ref(db,"grades/"+selectedStudent);
    const snap = await get(userRef);

    // initialize classes if empty
    if(!snap.exists()){
        for(let cls of classNames){ await set(ref(db,"grades/"+selectedStudent+"/"+cls),[]); }
    }

    for(let cls of classNames){
        const frame=document.createElement("div"); frame.className="class-frame";
        const gradesDiv=document.createElement("div"); gradesDiv.className="grades"; frame.appendChild(gradesDiv);

        const clsRef = ref(db,"grades/"+selectedStudent+"/"+cls);
        onValue(clsRef, snapshot=>{
            gradesDiv.innerHTML="";
            let sum=0,count=0;
            snapshot.forEach(child=>{
                const g=child.val(), id=child.key;
                const item=document.createElement("div"); item.className="grade-item";
                if(g.value){ item.innerHTML=`<span>Ocjena: ${g.value}</span><span class="biljeska">Bilješka: ${g.biljeska||""}</span>`; sum+=g.value; count++; }
                else{ item.innerHTML=`<span class="biljeska">Bilješka: ${g.biljeska}</span>`; }
                if(isAdmin){
                    const editBtn=document.createElement("button"); editBtn.textContent="Uredi"; editBtn.className="edit-btn";
                    editBtn.onclick=()=>{ 
                        const newValue=g.value ? prompt("Promijeni ocjenu:", g.value) : null;
                        const newNote=prompt("Promijeni bilješku:", g.biljeska||"");
                        update(ref(db,"grades/"+selectedStudent+"/"+cls+"/"+id),{value:newValue?parseInt(newValue):null,biljeska:newNote});
                    };
                    const delBtn=document.createElement("button"); delBtn.textContent="Izbriši"; delBtn.className="del-btn";
                    delBtn.onclick=()=>{ remove(ref(db,"grades/"+selectedStudent+"/"+cls+"/"+id)); };
                    item.appendChild(editBtn); item.appendChild(delBtn);
                }
                gradesDiv.appendChild(item);
            });
            // class average
            const avgDisplay=document.createElement("div"); avgDisplay.id="class-average"; avgDisplay.textContent="Prosjek: "+(count>0?(sum/count).toFixed(2):"-");
            frame.appendChild(avgDisplay);
            // final average
            const finalAvg=calculateFinalAverage(snapshot.val()?snapshot.val():{});
            const finalAvgDiv=document.getElementById("final-average");
            finalAvgDiv.textContent="Konačni prosjek: "+finalAvg;
            if(finalAvg!=="-"){ finalAvgDiv.style.color=finalAvg<3?"#f44336":"#4caf50"; }
        });

        // ADD BUTTONS FOR ADMIN
        if(isAdmin){
            const addBtn=document.createElement("button"); addBtn.textContent="Dodaj ocjenu";
            addBtn.onclick=()=>showGradeButtons(cls,frame);
            frame.appendChild(addBtn);

            const addNoteBtn=document.createElement("button"); addNoteBtn.textContent="Dodaj bilješku";
            addNoteBtn.onclick=()=>{
                const note=prompt("Unesite bilješku:");
                if(note){ push(ref(db,"grades/"+selectedStudent+"/"+cls),{biljeska:note,value:null}); }
            };
            frame.appendChild(addNoteBtn);
        }

        container.appendChild(frame);
    }
}

// --- SHOW GRADE BUTTONS ---
function showGradeButtons(cls, frame){
    const existing=frame.querySelector(".grade-buttons"); if(existing) existing.remove();
    const panel=document.createElement("div"); panel.className="grade-buttons";
    for(let g=1;g<=5;g++){
        const btn=document.createElement("button"); btn.textContent=g;
        btn.className=(g<=2)?"red":"green";
        btn.onclick=()=>{ 
            const note=prompt("Unesite bilješku za ocjenu "+g+":","");
            push(ref(db,"grades/"+selectedStudent+"/"+cls),{value:g,biljeska:note});
        };
        panel.appendChild(btn);
    }
    frame.appendChild(panel);
}
</script>
</body>
</html>
