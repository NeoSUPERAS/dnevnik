<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Dnevnik</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Comfortaa', cursive; background: linear-gradient(135deg,#e0f7fa,#fce4ec); margin:0; padding:0;}
  #login, #main { max-width: 750px; margin: 40px auto; background: #ffffffee; padding: 40px; border-radius: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); transition:0.3s;}
  h2 { text-align: center; margin-bottom: 25px; color:#34495e;}
  label { display: block; margin-top: 15px; font-weight: bold; color:#34495e;}
  input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size:1em; }
  button { cursor: pointer; border-radius: 8px; border: none; padding: 10px 18px; margin-top: 12px; font-weight: bold; transition:0.3s; background:#3498db; color:white; }
  button:hover { background:#2980b9; }
  #logout-btn { background:#e74c3c; margin-top:25px; }
  #logout-btn:hover { background:#c0392b; }
  .class-frame { border: none; padding:20px; margin:20px 0; border-radius:12px; background:#f0f4f8; box-shadow: 0 8px 16px rgba(0,0,0,0.1); transition:0.3s;}
  .class-header { display:flex; justify-content: space-between; align-items:center; cursor:pointer; font-weight:bold; font-size:1.2em; color:#2c3e50; }
  .grades { display:flex; flex-direction: column; margin-top: 12px; overflow:hidden; transition:max-height 0.3s ease;}
  .grade-item { display:flex; flex-direction:column; background:#ffffff; border-left:6px solid #3498db; border-radius:8px; padding:10px 12px; margin:5px 0; box-shadow:0 4px 6px rgba(0,0,0,0.05);}
  .grade-item span { margin:2px 0; }
  .grade-item span.biljeska { font-size:0.85em; color:#7f8c8d; margin-left:0; }
  .grade-buttons { margin-top: 10px; display:flex; flex-wrap:wrap; }
  .grade-buttons button { margin: 3px; padding: 8px 12px; border-radius:6px; border:none; color:white; font-weight:bold; }
  .grade-buttons button.red { background:#e74c3c; } .grade-buttons button.red:hover { background:#c0392b; }
  .grade-buttons button.green { background:#27ae60; } .grade-buttons button.green:hover { background:#1e8449; }
  .grade-item button.edit-btn { margin-left:5px; background:#f39c12; color:white; align-self:flex-end; }
  .grade-item button.edit-btn:hover { background:#d35400; }
  .grade-item button.del-btn { margin-left:5px; background:#e74c3c; color:white; align-self:flex-end; }
  .grade-item button.del-btn:hover { background:#c0392b; }
  @media (max-width:500px){ input, select, button { width:100%; margin-top:5px; } }
  #final-average { font-weight:bold; margin-top:20px; font-size:1.2em; text-align:right; color:#2c3e50; }
</style>
</head>
<body>

<div id="login">
  <h2>Dnevnik</h2>
  <label>Korisničko ime:</label>
  <input id="username">
  <label>Lozinka:</label>
  <input id="password" type="password">
  <button onclick="login()">Prijavi se</button>
</div>

<div id="main" style="display:none;">
  <h2>Dnevnik</h2>
  <div id="student-select-container" style="display:none; margin-bottom:15px;">
    <label>Odaberi studenta:</label>
    <select id="student-select"></select>
  </div>
  <div id="classes"></div>
  <div id="final-average"></div>
  <button id="logout-btn" onclick="logout()">Odjavi se</button>
</div>

<script>
/* CONFIG */
const ADMIN = {username:"neosuperas@dnevnik.com", password:"NSdvnk"};
const STUDENTS = [{username:"sssara@dnevnik.com", password:"SSara"}];
const classNames = ["Rekreacija","Kromarski","Životne vještine","Crtanje","Python","Izrađivanje"];

/* DATA */
let data = {};
for(let s of STUDENTS){ 
    if(!data[s.username]){
        data[s.username]={};
        for(let cls of classNames) data[s.username][cls]=[];
    }
}

let currentUser=null, isAdmin=false, selectedStudent=null;

// LOGIN
function login(){
    const user=document.getElementById("username").value;
    const pass=document.getElementById("password").value;
    if(user===ADMIN.username && pass===ADMIN.password){
        isAdmin=true; currentUser=ADMIN.username;
        document.getElementById("student-select-container").style.display="block";
        populateStudentSelect();
        selectedStudent=STUDENTS[0].username;
    } else {
        const student=STUDENTS.find(s=>s.username===user && s.password===pass);
        if(student){ isAdmin=false; currentUser=student.username; selectedStudent=student.username; document.getElementById("student-select-container").style.display="none"; }
        else{ alert("Neispravno korisničko ime ili lozinka!"); return; }
    }
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    renderClasses();
}

function logout(){ currentUser=null; selectedStudent=null; document.getElementById("login").style.display="block"; document.getElementById("main").style.display="none"; }

function populateStudentSelect(){
    const sel=document.getElementById("student-select");
    sel.innerHTML="";
    for(let s of STUDENTS){
        const opt=document.createElement("option");
        opt.value=s.username; opt.textContent=s.username; sel.appendChild(opt);
    }
    sel.onchange=()=>{ selectedStudent=sel.value; renderClasses(); };
}

// CALCULATE AVERAGES
function calculateFinalAverage(userGrades){
    let sum=0,count=0;
    for(let cls of classNames){ for(let g of userGrades[cls]){ if(g.value){ sum+=g.value; count++; } } }
    return count===0 ? "-" : (sum/count).toFixed(2);
}
function calculateClassAverage(grades){
    let sum=0,count=0; for(let g of grades){ if(g.value){ sum+=g.value; count++; } } return count===0 ? "-" : (sum/count).toFixed(2);
}

// RENDER CLASSES
function renderClasses(){
    const container=document.getElementById("classes");
    container.innerHTML="";
    const userGrades=isAdmin ? data[selectedStudent] : data[currentUser];

    for(let cls of classNames){
        const frame=document.createElement("div"); frame.className="class-frame";
        const avg = calculateClassAverage(userGrades[cls]);
        const header=document.createElement("div"); header.className="class-header"; header.textContent=cls + " (Prosjek: " + avg + ")";
        const gradesDiv=document.createElement("div"); gradesDiv.className="grades"; gradesDiv.style.maxHeight="500px";
        header.onclick=()=>{ gradesDiv.style.maxHeight = gradesDiv.style.maxHeight==="0px"?"500px":"0px"; };
        frame.appendChild(header);

        for(let i=0;i<userGrades[cls].length;i++){
            const g=userGrades[cls][i];
            const item=document.createElement("div"); item.className="grade-item";
            if(g.value){ item.innerHTML=`<span>Ocjena: ${g.value}</span><span class="biljeska">Bilješka: ${g.biljeska||""}</span>`; }
            else{ item.innerHTML=`<span class="biljeska">Bilješka: ${g.biljeska||""}</span>`; }
            if(isAdmin){
                const editBtn=document.createElement("button"); editBtn.textContent="Uredi"; editBtn.className="edit-btn";
                editBtn.onclick=()=>{ 
                    const newValue=g.value ? prompt("Promijeni ocjenu:", g.value) : null;
                    if(newValue) g.value=parseInt(newValue);
                    const newBiljeska=prompt("Promijeni bilješku:", g.biljeska||"");
                    g.biljeska=newBiljeska; renderClasses();
                };
                const delBtn=document.createElement("button"); delBtn.textContent="Izbriši"; delBtn.className="del-btn";
                delBtn.onclick=()=>{ userGrades[cls].splice(i,1); renderClasses(); };
                item.appendChild(editBtn); item.appendChild(delBtn);
            }
            gradesDiv.appendChild(item);
        }

        frame.appendChild(gradesDiv);

        if(isAdmin){
            const addBtn=document.createElement("button"); addBtn.textContent="Dodaj ocjenu"; addBtn.onclick=()=>showGradeButtons(cls, frame, userGrades);
            frame.appendChild(addBtn);
            const addNoteBtn=document.createElement("button"); addNoteBtn.textContent="Dodaj bilješku"; addNoteBtn.onclick=()=>{
                const biljeska=prompt("Unesite bilješku:"); if(biljeska){ userGrades[cls].push({biljeska:biljeska}); renderClasses(); }
            };
            frame.appendChild(addNoteBtn);
        }

        container.appendChild(frame);
    }

    const finalAvg=calculateFinalAverage(isAdmin ? data[selectedStudent] : data[currentUser]);
    const finalAvgDiv=document.getElementById("final-average");
    finalAvgDiv.textContent="Konačni prosjek: "+finalAvg;
    if(finalAvg!=="-"){ finalAvgDiv.style.color=finalAvg<3?"#e74c3c":"#27ae60"; }
}

// SHOW GRADE BUTTONS
function showGradeButtons(cls, frame, userGrades){
    const existing=frame.querySelector(".grade-buttons"); if(existing) existing.remove();
    const panel=document.createElement("div"); panel.className="grade-buttons";
    for(let g=1; g<=5; g++){
        const btn=document.createElement("button"); btn.textContent=g;
        btn.className=(g<=2)?"red":"green";
        btn.onclick=()=>{ const biljeska=prompt("Unesite bilješku za ocjenu "+g+":"); userGrades[cls].push({value:g,biljeska:biljeska}); renderClasses(); };
        panel.appendChild(btn);
    }
    frame.appendChild(panel);
}
</script>
</body>
</html>
